syntax = "proto3";

package app.users.v1;

message UserCreated {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  int64 created_at = 4;
}

message UserRoleAssigned {
  string user_id = 1;
  string role = 2;
  int64 assigned_at = 3;
}

message UserView {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  int64 created_at = 4;
}

message UserRolesView {
  string user_id = 1;
  repeated string roles = 2;
}

message CreateUserCommand {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
}

message AssignUserRoleCommand {
  string user_id = 1;
  string role = 2;
}
