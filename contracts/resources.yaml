resources:
- uri: resource://users/{user_id}
  projection: users_view
  schema: app.users.v1.UserView
  renderer: detail
  owner_agent: user-agent
  stability: stable
  version: v1
- uri: resource://users/{user_id}/roles
  projection: user_roles_view
  schema: app.users.v1.UserRolesView
  renderer: table
  owner_agent: user-agent
  stability: stable
  version: v1
- uri: resource://weather/forecast/{place}/{days}
  projection: weather_map_forecast_data_view
  schema: app.weather.v1.ForecastDataView
  renderer: json
  owner_agent: weather-map-agent
  stability: experimental
  version: v1
- uri: resource://weather/maps/{place}/forecast/{days}
  projection: weather_map_html_map_view
  schema: app.weather.v1.WeatherMapHtmlView
  renderer: html
  owner_agent: weather-map-agent
  stability: experimental
  version: v1
- uri: resource://invoices/{invoice_id}
  projection: invoices_view
  schema: app.invoices.v1.InvoiceView
  renderer: detail
  owner_agent: invoices-agent
  stability: stable
  version: v1
- uri: resource://invoices/{invoice_id}/events
  projection: invoice_events_view
  schema: app.invoices.v1.InvoiceEventsView
  renderer: timeline
  owner_agent: invoices-agent
  stability: stable
  version: v1
- uri: resource://dashboard/process/agent/{agent_id}/latest
  projection: dashboard_process_view
  schema: dashboard.v1.ProcessView
  renderer: html
  owner_agent: hypervisor-dashboard
  stability: experimental
  version: v1
- uri: resource://dashboard/workflow/{workflow_id}/timeline
  projection: dashboard_workflow_timeline_view
  schema: dashboard.v1.WorkflowTimelineView
  renderer: html
  owner_agent: hypervisor-dashboard
  stability: experimental
  version: v1
- uri: resource://dashboard/incident/{incident_id}/explain
  projection: dashboard_incident_explain_view
  schema: dashboard.v1.IncidentExplainView
  renderer: html
  owner_agent: hypervisor-dashboard
  stability: experimental
  version: v1
- uri: resource://dashboard/repair/agent/{agent_id}/diagnosis
  projection: dashboard_repair_diagnosis_view
  schema: dashboard.v1.RepairDiagnosisView
  renderer: json
  owner_agent: hypervisor-dashboard
  stability: experimental
  version: v1
