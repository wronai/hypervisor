views:
- name: users_view
  viewKind: detail
  mimeType: application/json
  columns:
  - user_id
  - email
  - display_name
  - created_at
  rendererHint: user-detail
- name: user_roles_view
  viewKind: table
  mimeType: application/json
  columns:
  - user_id
  - role
  - assigned_at
  rendererHint: compact-table
- name: weather_map_forecast_data_view
  viewKind: json
  mimeType: application/json
  columns:
  - place
  - days
  - model
  rendererHint: json
- name: weather_map_html_map_view
  viewKind: html
  mimeType: text/html
  columns:
  - place
  - days
  - html_url
  rendererHint: html
- name: invoices_view
  viewKind: detail
  mimeType: application/json
  columns:
  - invoice_id
  - customer_id
  - amount_cents
  - currency
  - status
  - created_at
  rendererHint: invoice-detail
- name: invoice_events_view
  viewKind: timeline
  mimeType: application/json
  columns:
  - invoice_id
  - events
  rendererHint: invoice-timeline
- name: dashboard_process_view
  viewKind: html
  mimeType: text/html
  columns:
  - agent_id
  - service_status
  - process_status
  - health_status
  rendererHint: process-dashboard
- name: dashboard_workflow_timeline_view
  viewKind: timeline
  mimeType: text/html
  columns:
  - workflow_id
  - steps
  rendererHint: workflow-timeline
- name: dashboard_incident_explain_view
  viewKind: html
  mimeType: text/html
  columns:
  - incident_id
  - symptoms
  - classification
  rendererHint: incident-explain
- name: dashboard_repair_diagnosis_view
  viewKind: json
  mimeType: application/json
  columns:
  - agent_id
  - repair_plan
  - classification
  rendererHint: json
