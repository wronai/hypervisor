[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri3"
version = "0.5.6"
description = "URI discovery, validation, routing and graph utilities"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "httpx>=0.27",
    "jsonschema>=4.23",
    "pyyaml>=6.0",
    "typer>=0.26.7",
]

[project.optional-dependencies]
browser = ["playwright>=1.40"]

[project.scripts]
uri3 = "uri3.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["uri3*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
