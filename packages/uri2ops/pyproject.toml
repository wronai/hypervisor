[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2ops"
version = "0.5.11"
description = "URI Operation Registry and Operator Runtime"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "fastapi>=0.115",
    "httpx>=0.27",
    "jsonschema>=4.23",
    "pyyaml>=6.0",
    "typer>=0.26.7",
]

[project.optional-dependencies]
browser = ["playwright>=1.40"]
windows = ["pywinauto>=0.6"]
server = ["uvicorn>=0.27"]

[project.scripts]
uri2ops = "uri2ops.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["uri2ops*"]

[tool.setuptools.package-data]
uri2ops = [
    "operation_registry/*.yaml",
    "schemas/*.json",
]
