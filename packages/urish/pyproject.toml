[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urish"
version = "0.1.0"
description = "Unified URI shell facade over uri3, uri2run, uri2ops, hypervisor, urigen"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "typer>=0.26.7",
    "uri2run",
    "uri2flow",
    "uri2ops",
    "uri3",
    "nl2uri",
    "resource-agent-hypervisor",
    "hypervisor-dashboard-agent",
    "urigen",
]

[project.scripts]
uri = "urish.cli:main"
urish = "urish.cli:main"
taskinity = "urish.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["urish*"]
