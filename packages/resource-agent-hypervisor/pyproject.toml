[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "resource-agent-hypervisor"
version = "0.5.6"
description = "Contract registry, domain packs, deployment registry and hypervisor control plane"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "uri3",
    "httpx>=0.27",
    "jsonschema>=4.23",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "typer>=0.26.7",
    "fastapi>=0.115",
]

[project.scripts]
hypervisor = "hypervisor.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["hypervisor*", "meta_agent*", "runtime_client*"]

[tool.setuptools.package-data]
hypervisor = ["py.typed", "data/*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
