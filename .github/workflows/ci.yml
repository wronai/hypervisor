name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-gate:
    name: Architecture gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (editable + dev)
        run: pip install -e ".[dev]"

      - name: Run architecture gate (boundaries + uri3 doctor)
        run: bash scripts/ci/architecture_gate.sh

  test:
    name: Full test suite
    runs-on: ubuntu-latest
    needs: architecture-gate
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (editable + dev)
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q

      - name: Check www docs examples are up to date
        run: |
          pip install markdown
          python3 scripts/www/build_examples_docs.py --check
          python3 scripts/www/check_examples_links.py

  examples:
    name: Examples integration
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (editable + dev + browser)
        run: |
          pip install -e ".[dev,browser]"
          playwright install chromium

      - name: Run examples tests
        run: pytest tests/examples -q
