deployments:
  - id: weather-map-agent.local-dev
    agent_ref: agent://weather-map-agent
    domain_ref: domain://weather-map
    target_uri: local://agents/generated/weather_map_agent
    agent_card_uri: http://localhost:8101/.well-known/agent-card.json
    health_uri: http://localhost:8101/health
    status: planned

  - id: weather-map-agent.ssh-dev
    agent_ref: agent://weather-map-agent
    domain_ref: domain://weather-map
    target_uri: ssh://deploy@localhost:2222/opt/agents/weather-map-agent
    agent_card_uri: http://localhost:8101/.well-known/agent-card.json
    health_uri: http://localhost:8101/health
    status: planned
    auth:
      mode: password
      username: deploy
      password_env: SSH_TEST_PASSWORD
