<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hypervisor Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>Hypervisor Chat</h1>
        <p class="subtitle">NL → plan → URI · połączenie z API systemu</p>
      </div>
      <div class="header-actions">
        <span id="status-pill" class="pill pill--pending">łączenie…</span>
        <a class="link" href="/ui/agents">Dashboard UI</a>
        <a class="link" href="demo.html">Demo statyczne</a>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <footer class="composer">
      <form id="chat-form">
        <textarea
          id="prompt"
          rows="2"
          placeholder="Np. stwórz dashboard agenta hypervisor… lub wklej URI agent://…"
          autocomplete="off"
        ></textarea>
        <div class="composer-bar">
          <label class="checkbox">
            <input type="checkbox" id="dry-run" checked>
            dry-run
          </label>
          <button type="submit" id="send-btn">Wyślij</button>
        </div>
      </form>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
